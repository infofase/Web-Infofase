name: Actualizar catálogo Infofase

on:
  repository_dispatch:
    types: [update-catalog]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Descargar CSV y actualizar catálogo
        run: python3 update_catalog.py
        env:
          ICECAT_USER: ${{ secrets.ICECAT_USER }}
          ICECAT_PASS: ${{ secrets.ICECAT_PASS }}

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "infofase-bot"
          git config user.email "info@infofase.com"
          git add index.html update.log img_cache.json
          git diff --staged --quiet || git commit -m "Auto: catálogo actualizado $(date '+%Y-%m-%d %H:%M')"
          git pull --rebase -X theirs origin main
          git push
