name: Actualizar catálogo Infofase

on:
  repository_dispatch:
    types: [update-catalog]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Descargar CSV y actualizar catálogo
        run: python3 update_catalog.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "infofase-bot"
          git config user.email "info@infofase.com"
          git add index.html update.log
          git diff --staged --quiet || git commit -m "Auto: catálogo actualizado $(date '+%Y-%m-%d %H:%M')"
          git push
